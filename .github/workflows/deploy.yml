name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4   # latest: v4.2.2

      # ── Primary presentation: Reveal.js (slides.html) ──────────────────
      # slides.html is self-contained (CDN-based), no build step needed.
      # Copy it as the index so it's served at the root of the Pages site.

      - name: Prepare dist folder
        run: |
          mkdir -p dist
          # Reveal.js 2D presentation → site root
          cp slides.html dist/index.html

          # Copy all markdown docs so they're browsable from GitHub Pages
          cp README.md dist/README.md
          cp -r [0-9][0-9]-*.md dist/ 2>/dev/null || true

          # Create a small redirect page for the old /slides path
          cat > dist/slidev.html << 'EOF'
          <!DOCTYPE html>
          <html><head><meta charset="utf-8">
          <title>Redirecting...</title>
          <meta http-equiv="refresh" content="0; url=./index.html">
          </head><body>
          <p><a href="./index.html">Click here</a> if not redirected.</p>
          </body></html>
          EOF

      # ── Optional: also build Slidev SPA into dist/slidev/ ──────────────
      # Uncomment this block if you want both presentations deployed:
      #
      # - name: Setup Node.js
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: '22'
      #     cache: 'npm'
      # - run: npm ci
      # - run: npx slidev build slides.md --base /javascript-security/slidev/ --out dist/slidev

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5   # updated from v4 → v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3   # v3 is still current (v4 is upload-artifact, different action)
        with:
          path: dist/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4   # latest: v4
