name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      # ── Compute base path from repo name (e.g. /javascript-security/) ──
      - name: Set Slidev base path
        id: base
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          echo "path=/${REPO_NAME}/" >> "$GITHUB_OUTPUT"
          echo "Base path: /${REPO_NAME}/"

      # ── Primary presentation: Slidev SPA ────────────────────────────────
      - name: Build Slidev presentation
        run: |
          npx slidev build slides.md \
            --base "${{ steps.base.outputs.path }}" \
            --out dist

      # ── Add SRI hashes to the Reveal.js file before including it ────────
      - name: Add SRI hashes to slides.html (Reveal.js)
        run: node scripts/add-sri.js

      # ── Include Reveal.js as /reveal.html and copy all markdown docs ────
      - name: Copy supporting files into dist
        run: |
          # Reveal.js 2D presentation available at /reveal.html
          cp slides.html dist/reveal.html

          # Copy all concept markdown files so deep-dive links work
          cp README.md dist/README.md
          cp -r [0-9][0-9]-*.md dist/ 2>/dev/null || true
          cp AGENT.md dist/AGENT.md 2>/dev/null || true

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
