name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Slidev
        run: |
          npx slidev build slides.md \
            --base /${{ github.event.repository.name }}/ \
            --out dist

      - name: Add SRI hashes to Reveal.js deck
        run: node scripts/add-sri.js
        continue-on-error: true

      - name: Copy Reveal.js deck and reference docs into dist
        run: |
          cp slides.html dist/reveal.html
          cp README.md dist/ 2>/dev/null || true
          cp [0-9][0-9]-*.md dist/ 2>/dev/null || true
          cp AGENT.md dist/ 2>/dev/null || true

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
