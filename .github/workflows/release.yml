name: Create Release with PDF Artifacts

on:
  push:
    tags:
      - 'v*.*.*'   # Triggers on version tags like v1.0.0
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write  # needed to create releases and upload assets

jobs:
  build-pdf-artifacts:
    name: Build PDF Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4   # latest: v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4   # latest: v4.x
        with:
          node-version: '22'   # upgraded from 20 → 22 (current LTS)

      - name: Install Node dependencies
        run: npm install --no-audit --no-fund

      - name: Install Playwright browsers (Chromium for PDF export)
        run: npx playwright install chromium --with-deps

      # ─────────────────────────────────────────────
      # 1. Export Reveal.js presentation as PDF
      #    Uses ?print-pdf Reveal.js feature + Playwright
      # ─────────────────────────────────────────────
      - name: Export Reveal.js presentation (slides.html) as PDF
        run: |
          mkdir -p dist
          node scripts/export-reveal-pdf.js dist/js-security-reveal-presentation.pdf

      # ─────────────────────────────────────────────
      # 2. Export Slidev presentation as PDF
      # ─────────────────────────────────────────────
      - name: Export Slidev presentation (slides.md) as PDF
        run: |
          npx slidev export slides.md \
            --format pdf \
            --output dist/js-security-slidev-presentation.pdf \
            --timeout 90000
        continue-on-error: true  # don't fail release if Slidev PDF fails

      # ─────────────────────────────────────────────
      # 3. Combine all concept markdown files into one PDF
      # ─────────────────────────────────────────────
      - name: Install Pandoc
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pandoc wkhtmltopdf xvfb

      - name: Combine concept markdowns into one document
        run: |
          {
            # Pandoc YAML front matter
            cat << 'FRONTMATTER'
          ---
          title: "JavaScript & Frontend Security — Complete Reference"
          author: "Security Reference"
          toc: true
          toc-depth: 2
          geometry: "margin=2.5cm"
          fontsize: 11pt
          colorlinks: true
          linkcolor: blue
          ---
          FRONTMATTER

          echo ""
          cat README.md

          # Sort and append all numbered concept files
          for f in $(ls [0-9][0-9]-*.md | sort -V); do
            echo ""
            echo "---"
            echo ""
            cat "$f"
          done
          } > /tmp/combined-docs.md

      - name: Convert combined markdown to PDF
        run: |
          xvfb-run --auto-servernum pandoc /tmp/combined-docs.md \
            --from=markdown+fenced_code_blocks \
            --to=pdf \
            --pdf-engine=wkhtmltopdf \
            --pdf-engine-opt="--enable-local-file-access" \
            --toc \
            --toc-depth=2 \
            --highlight-style=tango \
            -V geometry:margin=2.5cm \
            -V fontsize=11pt \
            -o dist/js-security-complete-reference.pdf \
            2>&1 || true

          # Fallback: xelatex if wkhtmltopdf fails
          if [ ! -f dist/js-security-complete-reference.pdf ] || \
             [ ! -s dist/js-security-complete-reference.pdf ]; then
            echo "wkhtmltopdf failed — trying xelatex fallback..."
            sudo apt-get install -y texlive-xetex texlive-fonts-recommended texlive-fonts-extra
            pandoc /tmp/combined-docs.md \
              --from=markdown \
              --to=pdf \
              --pdf-engine=xelatex \
              --toc \
              -V geometry:margin=2.5cm \
              -V mainfont="DejaVu Sans" \
              -o dist/js-security-complete-reference.pdf
          fi

      # ─────────────────────────────────────────────
      # 4. Create GitHub Release with all PDFs
      # ─────────────────────────────────────────────
      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: List generated artifacts
        run: ls -lah dist/*.pdf 2>/dev/null || echo "No PDFs found"

      - name: Create GitHub Release and upload PDFs
        uses: softprops/action-gh-release@v2   # latest: v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "JS Security Reference ${{ steps.tag.outputs.tag }}"
          body: |
            ## 📦 Release ${{ steps.tag.outputs.tag }}

            ### Artifacts

            | File | Description |
            |------|-------------|
            | `js-security-reveal-presentation.pdf` | **Reveal.js** slide deck — 2D navigation, code animations |
            | `js-security-slidev-presentation.pdf` | **Slidev** slide deck — alternative export |
            | `js-security-complete-reference.pdf` | All 47 concept markdown files combined into one document |

            ### What's Covered
            47 JavaScript & Frontend security concepts across 9 categories:
            - 🔴 Client-Side Attacks (XSS, Clickjacking, Prototype Pollution, DOM Clobbering, ReDoS, …)
            - 🟠 Injection Attacks (SQL, NoSQL, Command, LDAP, Template/SSTI)
            - 🟡 Cross-Origin & Request Forgery (CSRF, CORS Misconfiguration, SSRF)
            - 🟢 Authentication & Authorization (JWT, OAuth/OIDC, Broken AC, IDOR, Sessions)
            - 🔵 Transport Security (HTTPS, HSTS, MitM, Certificate Pinning, WebSockets)
            - 🟣 HTTP Security Headers (CSP, Secure Cookies, Referrer Policy, MIME Sniffing)
            - ⚫ Supply Chain (Supply Chain Attacks, SRI, Outdated Components, Third-Party Scripts)
            - 🔶 API & Backend Security (Rate Limiting, Crypto Failures, Mass Assignment)
            - 🔷 Availability & Monitoring (DoS/DDoS, Logging, Insecure Design/STRIDE)

            ### 🌐 Live Interactive Presentation
            `https://<your-username>.github.io/<your-repo-name>/`
            (Reveal.js — use ➡ for next category, ⬇ to dive into concepts)
          files: |
            dist/js-security-reveal-presentation.pdf
            dist/js-security-slidev-presentation.pdf
            dist/js-security-complete-reference.pdf
          fail_on_unmatched_files: false   # don't fail if Slidev PDF was skipped
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
